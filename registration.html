<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
    body{
    background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT59tl0Fhllev3rRVoL_dp7lqLkHadtUVRfvcsltSR3CA&s=10");
    background-size:cover;}
    form{
    width: 80%;
    max-width: 500px;
    min-width: 300px;
    margin: 30px auto;
    padding: 20px;
    border: 2px solid black;
    border-radius: 10px;
}
    h1,h2{
    text-align:center;}
    </style>
</head>
<body>

<h2 align="center">Registration Form</h2>

<form>

    <label for="fname">First Name:</label><br>
    <input type="text" id="fname" name="fname" required><br><br>

    <label for="lname">Last Name:</label><br>
    <input type="text" id="lname" name="lname" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" required><br><br>

    <label for="cpassword">Confirm Password:</label><br>
    <input type="password" id="cpassword" name="cpassword" required><br><br>

    <label>Gender</label><br>
    <input type="radio" id="male" name="gender" value="Male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label>

    <input type="radio" id="other" name="gender" value="Other">
    <label for="other">Other</label><br><br>
    <label>Hobbies:</label><br>
    <input type="checkbox" id="reading" name="hobby" value="Reading">
    <label for="reading">Reading</label>

    <input type="checkbox" id="music" name="hobby" value="Music">
    <label for="music">Music</label>

    <input type="checkbox" id="sports" name="hobby" value="Sports">
    <label for="sports">Sports</label>
    <br><br>

    <label for="dob">Date of Birth:</label><br>
    <input type="date" id="dob" name="dob"><br><br>

    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone"><br><br>

    <label for="city">City:</label><br>
    <select id="city" name="city">
        <option>Select City</option>
        <option>Hyderabad</option>
        <option>Chennai</option>
        <option>Bengaluru</option>
        <option>Mumbai</option>
    </select>
    <br><br>

    <label for="address">Address:</label><br>
    <textarea id="address" rows="4" cols="30"></textarea>
    <br><br>
    <input type="submit" value="Register" formaction="login.html">
    <input type="reset" value="Clear">

</form>

</body>
</html>
